<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kidventor Academy | Coding Classes for Kids</title>
    <meta name="description" content="Coding classes for kids, digital literacy, moral education and leadership development by Kidventor Academy.">
    <link rel="icon" type="image/png" href="image/favicon.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; font-weight: 700; letter-spacing: -0.02em; background: #f8fafc; }
        h1, h2, h3, .font-black { font-weight: 900; letter-spacing: -0.05em; line-height: 1.1; }
        html { scroll-behavior: smooth; }
        
        .glass-header { 
            background: rgba(255, 255, 255, 0.85); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px); 
        }

        .shine {
            background: linear-gradient(90deg, #4f46e5, #818cf8, #4f46e5);
            background-size: 200% auto;
            animation: shine 3s linear infinite;
        }
        @keyframes shine { to { background-position: 200% center; } }

        /* AUTH SYSTEM STYLING */
        #sticky-auth-wrapper {
            position: fixed;
            top: 95px; /* Below 80px navbar */
            right: 20px;
            z-index: 100;
        }

        #auth-form-card {
            width: 380px;
            max-width: 95vw;
            max-height: 80vh;
            overflow-y: auto;
            transform-origin: top;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar-btn.active {
            border-color: #4f46e5;
            background: #eef2ff;
        }

        @media (max-width: 1024px) {
            #sticky-auth-wrapper {
                position: fixed;
                top: auto;
                bottom: 20px;
                right: 20px;
            }
            #auth-form-card { width: 340px; }
        }
    </style>
</head>
<body class="text-slate-900 overflow-x-hidden">

<header class="fixed top-0 inset-x-0 z-[60] glass-header border-b border-indigo-50 px-4 md:px-6">
    <div class="max-w-7xl mx-auto h-20 flex items-center justify-between">
        <a href="index.html" class="flex items-center gap-3">
            <img src="https://raw.githubusercontent.com/SmartKids-app/kidventor/main/image/Logo_kiventor.png" class="w-12 h-12 object-contain rounded-xl shadow-lg" alt="Kidventor">
            <span class="font-black text-2xl">Kidventor</span>
        </a>

        <nav class="hidden lg:flex items-center gap-6 text-sm font-bold">
            <a href="#" class="hover:text-indigo-600 transition">Home</a>
            <a href="#" class="hover:text-indigo-600 transition">Lessons</a>
            <a href="#" class="hover:text-indigo-600 transition">Worksheets</a>
            <a href="#" class="hover:text-indigo-600 transition">Morals</a>
            <a href="#" class="hover:text-indigo-600 transition">Adventure</a>
        </nav>

        <button id="menu-toggle" class="lg:hidden text-indigo-600 text-3xl">☰</button>
    </div>
</header>

<div id="sticky-auth-wrapper">
    <button id="signup-trigger" onclick="toggleAuth()" class="flex items-center gap-3 px-5 py-3 bg-white border-2 border-indigo-100 rounded-2xl shadow-2xl hover:shadow-indigo-200 transition-all">
        <div class="text-right">
            <span class="block text-[9px] font-black uppercase tracking-tighter text-slate-400">Ready?</span>
            <span class="block text-sm font-black text-indigo-600">Sign Up</span>
        </div>
        <img id="sticky-avatar-preview" src="https://randomuser.me/api/portraits/men/32.jpg" class="w-10 h-10 rounded-full border-2 border-white shadow-sm" alt="Avatar">
    </button>

    <div id="auth-form-card" class="hidden opacity-0 -translate-y-10 bg-white rounded-3xl shadow-2xl border border-indigo-50 mt-4 overflow-hidden">
        <div class="p-8 relative">
            <button onclick="toggleAuth()" class="absolute top-4 right-4 text-2xl text-slate-300 hover:text-indigo-600 transition">×</button>

            <div class="text-center mb-6">
                <div class="w-20 h-20 rounded-full overflow-hidden border-4 border-white shadow-lg mx-auto mb-4">
                    <img id="form-avatar-main" src="https://randomuser.me/api/portraits/men/32.jpg" class="w-full h-full object-cover">
                </div>
                
                <div class="flex justify-center gap-3 mb-6">
                    <button id="male-btn" onclick="updateAvatar('male')" class="avatar-btn active p-1 rounded-full border-2 border-transparent transition">
                        <img src="https://randomuser.me/api/portraits/men/32.jpg" class="w-10 h-10 rounded-full">
                    </button>
                    <button id="female-btn" onclick="updateAvatar('female')" class="avatar-btn p-1 rounded-full border-2 border-transparent transition">
                        <img src="https://randomuser.me/api/portraits/women/44.jpg" class="w-10 h-10 rounded-full">
                    </button>
                </div>
                <h3 class="text-xl font-black">Join Academy</h3>
            </div>

            <form class="flex flex-col gap-3">
                <input type="text" placeholder="Full Name" class="w-full p-4 rounded-xl bg-slate-50 border-2 border-transparent focus:border-indigo-600 outline-none text-sm">
                <input type="email" placeholder="School Email" class="w-full p-4 rounded-xl bg-slate-50 border-2 border-transparent focus:border-indigo-600 outline-none text-sm">
                
                <select class="w-full p-4 rounded-xl bg-slate-50 border-2 border-transparent focus:border-indigo-600 outline-none text-sm">
                    <option disabled selected>Select Year</option>
                    <script>
                        for(let i=3; i<=12; i++) document.write(`<option>Year ${i}</option>`);
                    </script>
                </select>

                <input type="password" placeholder="Create Password" class="w-full p-4 rounded-xl bg-slate-50 border-2 border-transparent focus:border-indigo-600 outline-none text-sm">
                <input type="password" placeholder="Confirm Password" class="w-full p-4 rounded-xl bg-slate-50 border-2 border-transparent focus:border-indigo-600 outline-none text-sm">

                <button type="submit" class="w-full py-4 mt-2 rounded-xl bg-indigo-600 text-white font-black hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                    Create Account 🚀
                </button>
            </form>
        </div>
    </div>
</div>

<section class="pt-40 pb-24 px-4 bg-gradient-to-b from-indigo-50 to-white">
    <div class="max-w-7xl mx-auto grid lg:grid-cols-2 gap-12 items-center">
        <div data-aos="fade-right">
            <span class="inline-block px-4 py-2 rounded-full bg-indigo-100 text-indigo-700 text-xs font-black uppercase tracking-widest mb-6">🚀 Future Ready Kids</span>
            <h1 class="text-5xl md:text-6xl font-black mb-6">Kids shouldn't just use tech... <span class="text-indigo-600">they should create it.</span></h1>
            <p class="text-lg text-slate-600 mb-10 max-w-lg">Kidventor Academy blends coding, digital literacy and moral character to raise confident future leaders.</p>
            <div class="flex flex-wrap gap-4">
                <a href="#" class="shine text-white px-10 py-5 rounded-2xl font-black shadow-xl">🚀 Start Learning</a>
                <a href="#" class="px-10 py-5 rounded-2xl bg-white border-2 border-slate-100 font-black hover:bg-slate-50 transition">Our Story</a>
            </div>
        </div>
        <div data-aos="zoom-in" class="relative">
            <div class="absolute -inset-4 bg-indigo-100 rounded-[3rem] rotate-3 opacity-50"></div>
            <img src="https://raw.githubusercontent.com/SmartKids-app/smartkids-learning/main/image/side-view-two-siblings-home-together-playing-laptop.jpg" class="relative rounded-[2.5rem] shadow-2xl border-8 border-white w-full h-[500px] object-cover">
        </div>
    </div>
</section>

<script>
    AOS.init({ duration: 1000, once: true });

    const authCard = document.getElementById('auth-form-card');
    const signupBtn = document.getElementById('signup-trigger');

    function toggleAuth() {
        if (authCard.classList.contains('hidden')) {
            authCard.classList.remove('hidden');
            signupBtn.classList.add('opacity-0', 'pointer-events-none');
            setTimeout(() => {
                authCard.classList.remove('opacity-0', '-translate-y-10');
            }, 50);
        } else {
            authCard.classList.add('opacity-0', '-translate-y-10');
            setTimeout(() => {
                authCard.classList.add('hidden');
                signupBtn.classList.remove('opacity-0', 'pointer-events-none');
            }, 500);
        }
    }

    function updateAvatar(gender) {
        const male = "https://randomuser.me/api/portraits/men/32.jpg";
        const female = "https://randomuser.me/api/portraits/women/44.jpg";
        const selected = gender === 'male' ? male : female;
        
        document.getElementById('form-avatar-main').src = selected;
        document.getElementById('sticky-avatar-preview').src = selected;
        
        document.getElementById('male-btn').classList.toggle('active', gender === 'male');
        document.getElementById('female-btn').classList.toggle('active', gender === 'female');
    }
</script>
</body>
</html>
