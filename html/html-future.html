<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Future Tech Lab | Kidventor Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&family=Fira+Code:wght@400;500&display=swap');
        
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #bc13fe;
        }

        body { 
            font-family: 'Space Grotesk', sans-serif; 
            background-color: #030712; 
            color: #f8fafc;
            background-image: 
                radial-gradient(circle at 50% 50%, #1e1b4b 0%, #030712 100%);
        }

        .code-font { font-family: 'Fira Code', monospace; }

        .neon-border {
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.2);
        }

        .hologram-effect {
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.05) 0%, rgba(0, 243, 255, 0) 100%);
            position: relative;
            overflow: hidden;
        }

        .hologram-effect::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; height: 2px;
            background: var(--neon-cyan);
            opacity: 0.3;
            animation: scan 4s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .btn-future {
            background: linear-gradient(90deg, var(--neon-cyan), var(--neon-purple));
            transition: all 0.3s ease;
        }

        .btn-future:hover {
            filter: brightness(1.2);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.5);
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="min-h-screen p-6">

    <nav class="max-w-7xl mx-auto flex justify-between items-center mb-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 btn-future rounded-lg flex items-center justify-center font-bold text-white shadow-lg">🚀</div>
            <span class="text-xl font-bold tracking-tighter uppercase">Future Lab</span>
        </div>
        <div class="hidden md:flex gap-6 text-xs font-bold uppercase tracking-widest text-slate-400">
            <span class="text-cyan-400">● 01. AI Assist</span>
            <span>● 02. Web 3.0</span>
            <span>● 03. 3D Elements</span>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto grid lg:grid-cols-12 gap-8">
        
        <div class="lg:col-span-7 space-y-6">
            <div class="bg-slate-900/50 backdrop-blur-xl rounded-[2rem] p-6 neon-border">
                <div class="flex justify-between items-center mb-4 text-[10px] font-bold text-cyan-500 uppercase tracking-widest">
                    <span>System: Code Terminal v4.0</span>
                    <span class="animate-pulse">● Live Link Active</span>
                </div>
                
                <textarea id="future-code" 
                    class="w-full h-[450px] bg-transparent text-cyan-100 code-font text-lg outline-none resize-none"
                    spellcheck="false"
                    placeholder="<div class='card'>
  <h1>Hello Future</h1>
  <button>Launch</button>
</div>"></textarea>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-white/5">
                    <h4 class="text-purple-400 text-[10px] font-black uppercase mb-2">AI Suggestion 🤖</h4>
                    <p class="text-xs text-slate-400 mb-3">Try adding a glassmorphism effect to your buttons!</p>
                    <button onclick="applyAITip()" class="text-[10px] font-bold text-white underline underline-offset-4 hover:text-cyan-400">APPLY CODE</button>
                </div>
                <div class="bg-slate-800/40 p-5 rounded-2xl border border-white/5">
                    <h4 class="text-cyan-400 text-[10px] font-black uppercase mb-2">Tech Tip 💡</h4>
                    <p class="text-xs text-slate-400 mb-3">Use &lt;canvas&gt; for high-speed game graphics.</p>
                    <button class="text-[10px] font-bold text-white underline underline-offset-4 hover:text-purple-400">LEARN MORE</button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-5 flex flex-col gap-6">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] text-slate-500">Holographic Output</h2>
            <div class="hologram-effect bg-slate-900 rounded-[3rem] border-2 border-cyan-500/30 flex-1 shadow-[0_0_50px_rgba(0,243,255,0.1)] min-h-[500px]">
                <iframe id="output" class="w-full h-full border-none p-4"></iframe>
            </div>
            
            <button onclick="downloadFuture()" class="btn-future w-full py-5 rounded-2xl font-black text-sm uppercase tracking-widest shadow-2xl">
                Initialize System Download 📥
            </button>
        </div>

    </main>

    <script>
        const input = document.getElementById('future-code');
        const output = document.getElementById('output');

        function updatePreview() {
            const code = input.value;
            const doc = `
                <html>
                    <head>
                        <script src="https://cdn.tailwindcss.com"><\/script>
                        <style>
                            body { 
                                background: transparent; 
                                color: #00f3ff; 
                                font-family: sans-serif; 
                                display: flex; 
                                align-items: center; 
                                justify-content: center; 
                                height: 100vh;
                                margin: 0;
                            }
                            .card {
                                border: 2px solid #00f3ff;
                                padding: 2rem;
                                border-radius: 1rem;
                                text-align: center;
                                backdrop-filter: blur(5px);
                                background: rgba(0, 243, 255, 0.1);
                            }
                            h1 { font-weight: 800; text-transform: uppercase; letter-spacing: 2px; }
                            button { 
                                background: #bc13fe; 
                                color: white; 
                                border: none; 
                                padding: 10px 20px; 
                                border-radius: 5px; 
                                cursor: pointer;
                                font-weight: bold;
                                margin-top: 10px;
                            }
                        </style>
                    </head>
                    <body>${code}</body>
                </html>
            `;
            output.srcdoc = doc;
        }

        input.addEventListener('input', updatePreview);
        
        function applyAITip() {
            const tip = "\n<style>\n  button {\n    background: rgba(255,255,255,0.1) !important;\n    backdrop-filter: blur(10px);\n    border: 1px solid white !important;\n  }\n</style>";
            input.value += tip;
            updatePreview();
        }

        function downloadFuture() {
            const blob = new Blob([input.value], { type: "text/html" });
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "future-web.html";
            a.click();
        }

        // Run initial preview
        updatePreview();
    </script>
</body>
</html>
