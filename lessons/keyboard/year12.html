<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 12: Developer Edge | SmartKids</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .symbol-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; }
    .symbol-key { background: white; padding: 20px; border-radius: 15px; border-bottom: 4px solid #cbd5e1; font-family: monospace; font-size: 1.5rem; font-weight: 800; transition: all 0.2s; text-align: center; color: #64748b; }
    .symbol-active { border-color: #f59e0b; color: #f59e0b; transform: scale(1.05); box-shadow: 0 10px 15px -3px rgba(245, 158, 11, 0.2); }
    .symbol-success { background: #22c55e; border-color: #16a34a; color: white; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans p-8">

  <div id="graduation-overlay" class="fixed inset-0 z-[200] bg-slate-900 flex flex-col items-center justify-center text-center p-6 hidden">
    <div class="text-9xl mb-6">🎓</div>
    <h1 class="text-5xl font-black text-white mb-4">GRADUATION COMMENCING</h1>
    <p class="text-slate-400 text-xl max-w-md mb-8">This is your final assessment. 2 minutes to prove your mastery. 30 WPM required for certification.</p>
    <button onclick="startFinalExam()" class="bg-amber-500 text-slate-900 font-black px-12 py-6 rounded-2xl text-2xl hover:bg-amber-400 transition-all">START FINAL EXAM</button>
  </div>

  <main class="max-w-4xl mx-auto">
    <header class="text-center mb-12">
        <h1 class="text-4xl font-black text-slate-800">The Developer Edge</h1>
        <p class="text-slate-500 font-bold uppercase tracking-widest text-sm mt-2">Final Symbol Drill</p>
    </header>

    <div class="symbol-grid mb-12">
        <div id="S-{" class="symbol-key">{</div>
        <div id="S-}" class="symbol-key">}</div>
        <div id="S-[" class="symbol-key">[</div>
        <div id="S-]" class="symbol-key">]</div>
        <div id="S-<" class="symbol-key"><</div>
        <div id="S->" class="symbol-key">></div>
        <div id="S-/" class="symbol-key">/</div>
        <div id="S-\" class="symbol-key">\</div>
        <div id="S-|" class="symbol-key">|</div>
        <div id="S-_" class="symbol-key">_</div>
        <div id="S-+" class="symbol-key">+</div>
        <div id="S-=" class="symbol-key">=</div>
    </div>

    <div class="bg-slate-800 p-8 rounded-[2.5rem] text-center">
        <div id="target-symbol" class="text-8xl font-black text-amber-400 mb-4">?</div>
        <p class="text-slate-400 font-mono">Type the symbol shown above to proceed</p>
    </div>
  </main>

  <script>
    const symbols = ["{", "}", "[", "]", "<", ">", "/", "\\", "|", "_", "+", "="];
    let index = 0;

    function updateTarget() {
        if(index >= symbols.length) {
            document.getElementById('graduation-overlay').classList.remove('hidden');
            return;
        }
        const target = symbols[index];
        document.getElementById('target-symbol').innerText = target;
        document.querySelectorAll('.symbol-key').forEach(el => el.classList.remove('symbol-active'));
        document.getElementById(`S-${target}`).classList.add('symbol-active');
    }

    window.addEventListener('keydown', (e) => {
        if(e.key === symbols[index]) {
            const el = document.getElementById(`S-${symbols[index]}`);
            el.classList.replace('symbol-active', 'symbol-success');
            index++;
            setTimeout(updateTarget, 150);
        }
    });

    function startFinalExam() {
        // This will redirect to the special graduation.html 
        // which is a long-form typing test.
        window.location.href = 'graduation.html';
    }

    updateTarget();
  </script>
</body>
</html>
