<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 2: Treasure Hunt | SmartKids</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .folder-grid { display: grid; grid-template-cols: repeat(auto-fill, minmax(100px, 1fr)); gap: 1.5rem; }
    .folder-item { transition: all 0.2s; }
    .folder-item.hidden { display: none; }
    .found-animation { animation: bounce 0.5s infinite; }
    @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  </style>
</head>
<body class="bg-slate-100 min-h-screen p-8 font-sans">

  <div class="max-w-4xl mx-auto">
    <header class="text-center mb-10">
      <h1 class="text-4xl font-black text-slate-800 tracking-tight">The Search Treasure Hunt</h1>
      <p class="text-slate-500 mt-2">Don't click every folder! Type "Gold" in the search bar to find the treasure.</p>
    </header>

    <div class="bg-white p-6 rounded-[2rem] shadow-sm mb-8 flex items-center gap-4 border-2 border-blue-500">
      <span class="text-2xl">🔍</span>
      <input type="text" id="searchBar" placeholder="Search for your file here..." 
             class="w-full text-xl outline-none font-semibold text-slate-700"
             onkeyup="filterFolders()">
    </div>

    <div id="folderContainer" class="folder-grid bg-white p-10 rounded-[3rem] shadow-inner min-h-[400px]">
      </div>

    <div id="winMessage" class="hidden fixed inset-0 bg-blue-600/90 flex items-center justify-center z-50">
      <div class="bg-white p-12 rounded-[3rem] text-center shadow-2xl">
        <div class="text-7xl mb-4 found-animation">🏆</div>
        <h2 class="text-3xl font-black mb-2">Treasure Found!</h2>
        <p class="text-slate-500 mb-6">You used the Search Tool like a pro.</p>
        <button onclick="window.location.href='year3.html'" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold">
    Next Year: The Rescue
</button>
      </div>
    </div>
  </div>

  <script>
    const files = [
      "Homework", "Family_Photo", "Drum_Beat", "Recipe", "Game_Save", 
      "Gold_Coin", "School_Project", "Old_Music", "Vacation", "Ideas",
      "Draft_1", "Draft_2", "Secret_Map", "Banana", "Zebra", "Computer_Drawing"
    ];

    const container = document.getElementById('folderContainer');

    // 1. Create the folders
    function initGame() {
      files.forEach(name => {
        const div = document.createElement('div');
        div.className = 'folder-item flex flex-col items-center text-center';
        div.setAttribute('data-name', name.toLowerCase());
        
        // Use a coin icon for the treasure, folder for the rest
        const icon = name === "Gold_Coin" ? "🪙" : "📁";
        
        div.innerHTML = `
          <div class="text-5xl mb-1">${icon}</div>
          <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">${name}</span>
        `;

        if(name === "Gold_Coin") {
          div.onclick = () => document.getElementById('winMessage').classList.remove('hidden');
          div.style.cursor = "pointer";
        }

        container.appendChild(div);
      });
    }

    // 2. The "Search" Logic
    function filterFolders() {
      const query = document.getElementById('searchBar').value.toLowerCase();
      const items = document.querySelectorAll('.folder-item');

      items.forEach(item => {
        const name = item.getAttribute('data-name');
        if (name.includes(query)) {
          item.classList.remove('hidden');
        } else {
          item.classList.add('hidden');
        }
      });
    }

    initGame();
  </script>
</body>
</html>
