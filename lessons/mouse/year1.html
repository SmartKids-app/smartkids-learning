<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 1: Balloon Pop | SmartKids</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #game-canvas { cursor: crosshair; touch-action: none; }
    .balloon { position: absolute; transition: transform 0.1s linear; cursor: pointer; user-select: none; }
    
    /* Modern Feedback Overlay Animation */
    @keyframes slideUp {
      0% { transform: translateY(100%); opacity: 0; }
      10% { transform: translateY(0); opacity: 1; }
      90% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(100%); opacity: 0; }
    }
    .feedback-overlay { animation: slideUp 2s forwards; }
  </style>
</head>
<body class="bg-slate-900 min-h-screen overflow-hidden font-sans">

  <div id="diy-manual" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100] flex items-center justify-center p-6">
    <div class="bg-white max-w-md rounded-[3rem] p-10 shadow-2xl border-4 border-amber-400">
      <div class="text-4xl mb-4">🎈</div>
      <h2 class="text-3xl font-black mb-4 text-slate-800">Mission: Accuracy</h2>
      <div class="space-y-3 mb-8 text-slate-600">
        <p class="font-bold">How to Play:</p>
        <ul class="list-disc pl-5 space-y-2">
            <li>Use your <b>Index Finger</b> on the <b>Left Button</b>.</li>
            <li>Click the center of the balloons to pop them.</li>
            <li>Pop 10 balloons to complete Year 1!</li>
        </ul>
      </div>
      <button onclick="startGame()" class="w-full bg-amber-500 text-white py-4 rounded-2xl font-bold text-xl hover:scale-105 transition-all">Start Popping!</button>
    </div>
  </div>

  <div class="absolute top-6 left-6 z-10 flex gap-4">
    <div class="bg-white/10 backdrop-blur-md border border-white/20 px-6 py-2 rounded-2xl text-white font-black">
      POPS: <span id="score" class="text-amber-400">0</span> / 10
    </div>
  </div>

  <div id="game-canvas" class="w-full h-screen relative">
    </div>

  <div id="feedback-container" class="fixed inset-x-0 bottom-10 flex justify-center pointer-events-none z-50"></div>

  <div id="success-modal" class="hidden fixed inset-0 bg-slate-900/95 flex items-center justify-center z-50 p-6 text-center">
    <div class="bg-white p-12 rounded-[3.5rem] max-w-sm border-b-8 border-amber-400">
        <div class="text-7xl mb-4">🎈✨</div>
        <h2 class="text-3xl font-black mb-2 text-slate-800">Precision Master!</h2>
        <p class="text-slate-500 mb-8">Your index finger is getting fast! You've unlocked Year 2.</p>
        <button onclick="window.location.href='mouse-practice.html?unlocked=2'" 
        class="w-full bg-indigo-600 text-white py-4 rounded-2xl font-black text-xl hover:scale-105 transition-all">
    UNLOCK YEAR 2 🚀
</button>
    </div>
    </div>

  <script>
    let score = 0;
    const canvas = document.getElementById('game-canvas');
    const colors = ['#f59e0b', '#3b82f6', '#ef4444', '#10b981', '#8b5cf6'];

    function startGame() {
        document.getElementById('diy-manual').remove();
        spawnBalloon();
    }

    function spawnBalloon() {
        if (score >= 10) return;

        const balloon = document.createElement('div');
        balloon.className = 'balloon text-6xl';
        balloon.innerHTML = '🎈';
        balloon.style.left = Math.random() * 80 + 10 + '%';
        balloon.style.top = '100%';
        balloon.style.color = colors[Math.floor(Math.random() * colors.length)];
        
        canvas.appendChild(balloon);

        let pos = 100;
        const speed = 0.3 + (score * 0.05); // Gets faster as you progress
        
        const moveInterval = setInterval(() => {
            pos -= speed;
            balloon.style.top = pos + '%';
            
            if (pos < -10) {
                clearInterval(moveInterval);
                balloon.remove();
                spawnBalloon(); // Respawn if missed
            }
        }, 10);

        balloon.onclick = () => {
            clearInterval(moveInterval);
            balloon.innerHTML = '💥';
            score++;
            document.getElementById('score').innerText = score;
            showFeedback("🎯 Nice Shot!", true);
            
            setTimeout(() => {
                balloon.remove();
                if (score < 10) {
                    spawnBalloon();
                } else {
                    document.getElementById('success-modal').classList.remove('hidden');
                }
            }, 300);
        };
    }

    function showFeedback(text, isSuccess) {
        const container = document.getElementById('feedback-container');
        container.innerHTML = '';
        const div = document.createElement('div');
        div.className = `feedback-overlay px-8 py-3 rounded-full text-white font-bold bg-amber-500 shadow-xl`;
        div.innerHTML = text;
        container.appendChild(div);
    }
  </script>
</body>
</html>





<!--<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Year 1: Mouse Basics | SmartKids Learning</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    #game-canvas {
      cursor: crosshair;
      touch-action: none;
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .bubble:active { transform: scale(0.9); }
    @keyframes pop {
      0% { transform: scale(1); opacity: 1; }
      100% { transform: scale(1.5); opacity: 0; }
    }
    .popped { animation: pop 0.3s forwards; pointer-events: none; }
  </style>
</head>
<body class="bg-blue-50 text-slate-900 font-sans overflow-x-hidden">

  <nav class="bg-white border-b py-4 px-6 flex justify-between items-center shadow-sm">
    <a href="../mouse-practice.html" class="text-blue-600 font-bold flex items-center gap-2">
      <span>←</span> Back to Hub
    </a>
    <div class="text-slate-500 font-medium text-sm">Year 1: Mouse Movement & Clicking</div>
  </nav>

  <main class="max-w-4xl mx-auto py-8 px-4">
    <header class="text-center mb-8">
      <h1 class="text-3xl font-extrabold text-blue-800">Bubble Pop Challenge! 🎈</h1>
      <p class="text-slate-600 mt-2">Move your mouse and click the bubbles before they disappear!</p>
    </header>

    <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-blue-100 mb-6">
      <div class="text-lg font-bold text-blue-600">Score: <span id="score">0</span></div>
      <div class="text-lg font-bold text-orange-500">Timer: <span id="timer">30</span>s</div>
      <button id="start-btn" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold hover:bg-blue-700 transition">Start Game</button>
    </div>

    <div id="game-area" class="relative w-full h-[400px] bg-white rounded-3xl border-4 border-blue-200 overflow-hidden shadow-inner bg-[radial-gradient(#e0f2fe_1px,transparent_1px)] [background-size:20px_20px]">
        <div id="instruction-overlay" class="absolute inset-0 flex items-center justify-center bg-white/80 z-10 text-center p-6">
            <div>
                <div class="text-5xl mb-4">🖱️</div>
                <h3 class="text-xl font-bold text-slate-800">Ready to Practice?</h3>
                <p class="text-slate-600 max-w-xs">Click the blue button above to begin. Pop as many as you can!</p>
            </div>
        </div>
    </div>

    <section class="mt-12 grid md:grid-cols-2 gap-8">
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-blue-700 mb-2">How to hold your mouse:</h3>
            <p class="text-sm text-slate-600 leading-relaxed">
                Rest your palm on the back of the mouse. Put your <b>index finger</b> on the left button. This is the finger you will use to pop the bubbles!
            </p>
        </div>
        <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-100">
            <h3 class="font-bold text-blue-700 mb-2">What is a "Click"?</h3>
            <p class="text-sm text-slate-600 leading-relaxed">
                A click is a quick press and release of the left mouse button. Try not to hold it down too long—just a quick "tap" with your finger!
            </p>
        </div>
    </section>
  </main>

  <script>
    const gameArea = document.getElementById('game-area');
    const startBtn = document.getElementById('start-btn');
    const scoreEl = document.getElementById('score');
    const timerEl = document.getElementById('timer');
    const overlay = document.getElementById('instruction-overlay');

    let score = 0;
    let timeLeft = 30;
    let gameActive = false;
    let spawnInterval;

    const colors = ['#3b82f6', '#0ea5e9', '#6366f1', '#8b5cf6'];

    function createBubble() {
      if (!gameActive) return;

      const bubble = document.createElement('div');
      const size = Math.floor(Math.random() * 40) + 40;
      const x = Math.random() * (gameArea.clientWidth - size);
      const y = Math.random() * (gameArea.clientHeight - size);

      bubble.className = 'bubble';
      bubble.style.width = `${size}px`;
      bubble.style.height = `${size}px`;
      bubble.style.left = `${x}px`;
      bubble.style.top = `${y}px`;
      bubble.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
      bubble.style.border = '3px solid rgba(255,255,255,0.3)';

      bubble.addEventListener('mousedown', () => {
        score++;
        scoreEl.innerText = score;
        bubble.classList.add('popped');
        setTimeout(() => bubble.remove(), 300);
      });

      gameArea.appendChild(bubble);

      // Remove bubble if not clicked after 2 seconds
      setTimeout(() => {
        if (bubble.parentNode) bubble.remove();
      }, 2000);
    }

    function startGame() {
      score = 0;
      timeLeft = 30;
      gameActive = true;
      scoreEl.innerText = score;
      timerEl.innerText = timeLeft;
      overlay.classList.add('hidden');
      startBtn.disabled = true;
      startBtn.classList.add('opacity-50');

      spawnInterval = setInterval(createBubble, 800);

      const countdown = setInterval(() => {
        timeLeft--;
        timerEl.innerText = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(countdown);
          clearInterval(spawnInterval);
          endGame();
        }
      }, 1000);
    }

    function endGame() {
      gameActive = false;
      startBtn.disabled = false;
      startBtn.classList.remove('opacity-50');
      overlay.classList.remove('hidden');
      overlay.innerHTML = `
        <div>
            <h3 class="text-2xl font-bold text-blue-800">Game Over!</h3>
            <p class="text-lg text-slate-600 mb-4">You popped ${score} bubbles!</p>
            <button onclick="location.reload()" class="bg-blue-600 text-white px-6 py-2 rounded-full font-bold">Try Again</button>
        </div>
      `;
    }

    startBtn.addEventListener('click', startGame);
  </script>
</body>
</html>
