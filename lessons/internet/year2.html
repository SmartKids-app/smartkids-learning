<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Year 2: Info Scout | SmartKids</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .scout-bg { background: #fdfcf0; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 30px 30px; }
    .card-float { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .fact-glow { box-shadow: 0 0 30px rgba(34, 197, 94, 0.6); border-color: #22c55e !important; transform: scale(1.02); }
    .fake-glow { box-shadow: 0 0 30px rgba(239, 68, 68, 0.6); border-color: #ef4444 !important; transform: scale(0.98); }
    @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-10px); } 75% { transform: translateX(10px); } }
    .animate-shake { animation: shake 0.2s ease-in-out 0s 2; }
  </style>
</head>
<body class="scout-bg min-h-screen p-6 font-sans">

  <div class="max-w-4xl mx-auto">
    <header class="bg-white border-4 border-slate-800 rounded-[2.5rem] p-8 mb-10 flex justify-between items-center shadow-xl">
      <div>
        <h1 class="text-3xl font-black text-slate-800 tracking-tighter uppercase">Scout_Scanner 🔍</h1>
        <p class="text-slate-500 font-bold text-xs uppercase tracking-widest">Mission: Truth vs. Trash</p>
      </div>
      <div class="bg-slate-100 px-6 py-2 rounded-2xl border-2 border-slate-200">
        <span id="score-display" class="text-3xl font-black text-slate-800">0/7</span>
      </div>
    </header>

    <div id="game-container" class="space-y-8">
        <div class="text-center mb-4">
            <h2 class="text-xl font-bold text-slate-400 italic">Analyze the digital parcel below...</h2>
        </div>

        <div id="parcel" class="bg-white border-4 border-slate-200 rounded-[3rem] p-12 shadow-2xl relative overflow-hidden card-float">
            <div id="parcel-source" class="absolute top-6 left-6 text-[10px] font-black uppercase tracking-widest text-slate-400 bg-slate-50 px-3 py-1 rounded-full border">Source: Web_Result_#01</div>
            
            <div class="py-12 text-center min-h-[200px] flex items-center justify-center">
                <p id="parcel-text" class="text-3xl font-black text-slate-800 leading-tight">
                    "The Great Wall of China is visible from the Moon."
                </p>
            </div>

            <div class="grid grid-cols-2 gap-6">
                <button onclick="checkAnswer('fact')" class="bg-emerald-500 text-white py-6 rounded-3xl font-black text-2xl hover:bg-emerald-600 active:scale-95 transition-all shadow-lg border-b-8 border-emerald-700">✅ FACT</button>
                <button onclick="checkAnswer('fake')" class="bg-rose-500 text-white py-6 rounded-3xl font-black text-2xl hover:bg-rose-600 active:scale-95 transition-all shadow-lg border-b-8 border-rose-700">❌ TRICKY / AD</button>
            </div>
        </div>
    </div>

    <div id="feedback" class="mt-8 text-center text-xl font-black opacity-0 transition-opacity duration-300">
        SCANNING...
    </div>
  </div>

  <div id="success-modal" class="hidden fixed inset-0 bg-slate-900/95 z-50 flex items-center justify-center p-6 backdrop-blur-sm">
    <div class="bg-white text-center p-12 rounded-[4rem] shadow-2xl border-b-[16px] border-indigo-600 max-w-md">
        <div class="text-9xl mb-6">🦅</div>
        <h2 class="text-4xl font-black text-slate-800 mb-4">Eagle Eye!</h2>
        <p class="text-slate-500 text-lg mb-8">You successfully scanned all 7 parcels. Your vision is sharp and you are ready for the Final Hero Mission.</p>
        <button onclick="window.location.href='email-basics.html?unlocked=3'" class="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-2xl hover:bg-indigo-700 transition-all">RESCUE THE INBOX</button>
    </div>
  </div>

  <script>
    const items = [
        { text: "The Great Wall of China is visible from the Moon.", type: "fake" }, // It's actually a common myth!
        { text: "CLICK HERE to win a free iPhone 25 right now!", type: "fake" },
        { text: "The capital of France is Paris.", type: "fact" },
        { text: "Dogs are the best pets in the whole world.", type: "fake" }, // This is an opinion
        { text: "Water is made of two Hydrogen atoms and one Oxygen atom.", type: "fact" },
        { text: "WARNING: Your computer has 5,000 viruses! Click to clean!", type: "fake" },
        { text: "Honey never spoils. Archaeologists have found edible 3,000-year-old honey!", type: "fact" }
    ];

    let currentItemIndex = 0;
    let score = 0;

    function checkAnswer(userChoice) {
        const parcel = document.getElementById('parcel');
        const feedback = document.getElementById('feedback');
        const scoreEl = document.getElementById('score-display');
        
        const currentItem = items[currentItemIndex];
        const isCorrect = userChoice === currentItem.type;

        // Visual Feedback Logic
        if (isCorrect) {
            score++;
            scoreEl.innerText = `${score}/7`;
            parcel.classList.add('fact-glow');
            feedback.innerText = "ACCURATE SCAN! +1 POINT";
            feedback.className = "mt-8 text-center text-xl font-black text-emerald-500 opacity-100";
        } else {
            parcel.classList.add('fake-glow', 'animate-shake');
            feedback.innerText = "SCAN ERROR! THAT WAS TRICKY.";
            feedback.className = "mt-8 text-center text-xl font-black text-rose-500 opacity-100";
        }

        // Lock buttons during animation
        document.querySelectorAll('button').forEach(btn => btn.style.pointerEvents = 'none');

        setTimeout(() => {
            parcel.classList.remove('fact-glow', 'fake-glow', 'animate-shake');
            feedback.classList.add('opacity-0');
            document.querySelectorAll('button').forEach(btn => btn.style.pointerEvents = 'auto');
            advanceGame();
        }, 1500);
    }

    function advanceGame() {
        currentItemIndex++;
        
        if (currentItemIndex >= items.length) {
            document.getElementById('success-modal').classList.remove('hidden');
        } else {
            const currentItem = items[currentItemIndex];
            document.getElementById('parcel-text').innerText = currentItem.text;
            document.getElementById('parcel-source').innerText = `Source: Web_Result_#0${currentItemIndex + 1}`;
        }
    }
  </script>
</body>
</html>
