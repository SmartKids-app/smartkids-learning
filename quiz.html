<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ICT Command Center | Kidventor Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background: #0f172a; /* Deep Space Blue */
            color: #f8fafc;
        }

        .tech-card {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .option-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .option-btn:hover:not(:disabled) {
            background: rgba(99, 102, 241, 0.2);
            border-color: #818cf8;
            transform: translateX(10px);
        }

        .option-btn.correct { background: #059669; border-color: #34d399; color: white; }
        .option-btn.wrong { background: #dc2626; border-color: #f87171; color: white; }

        .progress-bar-fill {
            transition: width 0.5s ease-out;
            background: linear-gradient(90deg, #6366f1, #a855f7);
        }

        .scanline {
            width: 100%;
            height: 2px;
            background: rgba(99, 102, 241, 0.2);
            position: absolute;
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-6 overflow-hidden">

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <div class="flex items-center gap-4">
            <div class="h-10 w-10 bg-indigo-600 rounded-lg flex items-center justify-center font-bold shadow-lg shadow-indigo-500/20">K</div>
            <div>
                <p class="text-[10px] font-black uppercase tracking-widest text-indigo-400">ICT Division</p>
                <h2 id="level-indicator" class="text-sm font-bold">Initializing Module...</h2>
            </div>
        </div>
        
        <div class="flex gap-4">
            <div class="bg-slate-800/50 px-4 py-2 rounded-xl border border-white/5 flex items-center gap-3">
                <span class="text-xs font-bold text-slate-400">SCORE</span>
                <span id="current-score" class="font-mono text-indigo-400 font-bold">00</span>
            </div>
            <div class="bg-slate-800/50 px-4 py-2 rounded-xl border border-white/5 flex items-center gap-3">
                <span class="text-xs font-bold text-slate-400">TIME</span>
                <span id="timer" class="font-mono text-rose-400 font-bold">30s</span>
            </div>
        </div>
    </nav>

    <main class="w-full max-w-3xl relative">
        <div class="scanline"></div>

        <div id="loading-screen" class="text-center py-20">
            <div class="inline-block animate-spin rounded-full h-12 w-12 border-t-2 border-b-2 border-indigo-500 mb-4"></div>
            <p class="text-indigo-300 font-bold tracking-widest uppercase text-xs">Accessing Mainframe...</p>
        </div>

        <div id="start-screen" class="hidden tech-card p-12 rounded-[2.5rem] text-center space-y-8 animate-in fade-in zoom-in duration-500">
            <div class="mx-auto w-24 h-24 bg-indigo-500/10 rounded-full flex items-center justify-center text-5xl mb-4 shadow-inner">💻</div>
            <div>
                <h1 id="start-title" class="text-4xl font-black mb-2 uppercase tracking-tighter">ICT Module</h1>
                <p id="start-desc" class="text-slate-400">Broadening your technical horizons.</p>
            </div>
            <button onclick="begin()" class="group relative w-full overflow-hidden bg-indigo-600 py-5 rounded-2xl font-black uppercase tracking-widest hover:bg-indigo-500 transition-all">
                <span class="relative z-10">Initialize Mission</span>
                <div class="absolute inset-0 bg-white/10 translate-y-full group-hover:translate-y-0 transition-transform"></div>
            </button>
        </div>

        <div id="quiz-content" class="hidden space-y-6">
            <div class="w-full bg-slate-800 h-1.5 rounded-full overflow-hidden">
                <div id="progress-bar" class="progress-bar-fill h-full w-0"></div>
            </div>

            <div class="tech-card p-10 rounded-[2.5rem] relative overflow-hidden">
                <div class="flex justify-between items-center mb-8">
                    <span class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Question <span id="q-number">01</span></span>
                    <span class="h-2 w-2 rounded-full bg-indigo-500 animate-ping"></span>
                </div>
                
                <h2 id="question-text" class="text-2xl font-bold mb-10 leading-relaxed text-slate-100">---</h2>
                
                <div id="options-grid" class="grid grid-cols-1 gap-4">
                    </div>
            </div>
        </div>

        <div id="result-screen" class="hidden tech-card p-12 rounded-[3.5rem] text-center space-y-8">
            <div id="result-icon" class="text-7xl">📡</div>
            <h2 id="result-title" class="text-4xl font-black uppercase tracking-tighter">Analysis Complete</h2>
            <div class="bg-indigo-600/10 border border-indigo-500/20 py-8 rounded-3xl">
                <p class="text-slate-400 text-xs uppercase font-bold tracking-widest mb-2">Final Proficiency Score</p>
                <span id="final-score" class="text-6xl font-black text-white">0%</span>
            </div>
            <p id="result-msg" class="text-slate-400"></p>
            <div class="flex gap-4">
                <button onclick="location.href='index.html'" class="flex-1 bg-slate-800 py-4 rounded-2xl font-bold hover:bg-slate-700 transition-all">TERMINAL LOBBY</button>
                <button id="next-btn" class="hidden flex-1 bg-indigo-600 py-4 rounded-2xl font-bold hover:bg-indigo-500 transition-all shadow-lg shadow-indigo-500/20">NEXT MODULE</button>
            </div>
        </div>

    </main>

    <script>
function updateLocks() {
    // 1. Pull Progress from LocalStorage
    const unlockLevel1 = localStorage.getItem("unlock_level1");
    const unlockLevel2 = localStorage.getItem("unlock_level2");
    const unlockLevel3 = localStorage.getItem("unlock_level3");

    // Helper function to safely update card UI
    const activateLevel = (id, nextLevelKey, bgColor) => {
        const card = document.getElementById(id);
        if (card) {
            card.classList.remove("opacity-50", "pointer-events-none", "locked");
            card.href = `quiz.html?level=${nextLevelKey}`;
            
            // Target the button area safely
            const btn = card.querySelector(".btn-label") || card.querySelector("div:last-child div:last-child");
            if (btn) {
                btn.innerText = "START LEVEL";
                btn.className = `w-full text-center py-3 rounded-2xl ${bgColor} text-white font-black transition-all hover:scale-105`;
            }
            
            // Remove lock icon if it exists
            const lockIcon = card.querySelector(".lock-icon");
            if (lockIcon) lockIcon.innerText = "🔓";
        }
    };

    // 2. Apply Unlocks
    if (unlockLevel1 === "true") activateLevel("link-level2", "level2", "bg-blue-600");
    if (unlockLevel2 === "true") activateLevel("link-level3", "level3", "bg-amber-500");
    if (unlockLevel3 === "true") activateLevel("link-advance", "advance", "bg-indigo-500");

    // 3. Update Progress Bar
    let progressValue = 25;
    if (unlockLevel1 === "true") progressValue = 50;
    if (unlockLevel2 === "true") progressValue = 75;
    if (unlockLevel3 === "true") progressValue = 100;

    const fill = document.getElementById("progress-fill");
    const label = document.getElementById("progress-label");

    if (fill) fill.style.width = progressValue + "%";
    
    if (label) {
        const labelMap = {
            25: "1 / 4 Levels",
            50: "2 / 4 Levels",
            75: "3 / 4 Levels",
            100: "All Levels Unlocked!"
        };
        label.innerText = labelMap[progressValue];
    }
}

// Run on load
window.onload = updateLocks;
</script>
</body>
</html>
