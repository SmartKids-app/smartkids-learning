<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Circuit Runner | Kidventor Maze</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }
        .maze-container {
            cursor: none; /* Hide real cursor to use custom one */
        }
        #custom-cursor {
            width: 20px;
            height: 20px;
            background: #3b82f6;
            border: 2px solid white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 100;
            box-shadow: 0 0 15px #3b82f6;
            transition: transform 0.1s ease-out;
        }
        .wall {
            background: #1e293b;
            border: 1px solid #334155;
            position: absolute;
            transition: background 0.3s;
        }
        .wall:hover {
            background: #ef4444; /* Glow red on fail */
        }
        .goal {
            background: #10b981;
            box-shadow: 0 0 20px #10b981;
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            color: white;
            cursor: pointer;
        }
    </style>
</head>
<body class="flex flex-col items-center justify-center min-h-screen">

    <!-- UI Header -->
    <div class="fixed top-8 left-0 right-0 px-10 flex justify-between items-center z-50">
        <div>
            <p class="text-blue-400 text-xs font-black uppercase tracking-widest">Kidventor Academy</p>
            <h1 class="text-3xl font-black">CIRCUIT RUNNER</h1>
        </div>
        <div class="flex gap-6">
            <div class="text-center">
                <p class="text-[10px] uppercase text-slate-400">Current Level</p>
                <p id="level-display" class="text-2xl font-black text-emerald-400">1</p>
            </div>
            <div class="text-center">
                <p class="text-[10px] uppercase text-slate-400">Attempts</p>
                <p id="fail-display" class="text-2xl font-black text-rose-400">0</p>
            </div>
        </div>
    </div>

    <!-- Game Board -->
    <div id="game-board" class="maze-container relative bg-slate-900 w-[90vw] h-[70vh] rounded-[2.5rem] border-4 border-slate-800 overflow-hidden shadow-2xl">
        <!-- Walls and Goals will be injected here -->
    </div>

    <!-- Custom Cursor -->
    <div id="custom-cursor"></div>

    <!-- Overlay Message -->
    <div id="msg-overlay" class="fixed inset-0 bg-slate-950/80 backdrop-blur-md z-[60] flex flex-col items-center justify-center text-center px-6">
        <h2 id="msg-title" class="text-5xl font-black mb-4 uppercase">System Initialized</h2>
        <p id="msg-body" class="text-slate-400 max-w-md mb-8 italic">Move your mouse to the GREEN zone to begin the circuit sync.</p>
        <button id="start-btn" class="bg-blue-600 hover:bg-blue-500 text-white font-black px-10 py-4 rounded-2xl shadow-lg shadow-blue-500/20 transition-all">
            SYNC SENSORS
        </button>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const cursor = document.getElementById('custom-cursor');
        const overlay = document.getElementById('msg-overlay');
        const startBtn = document.getElementById('start-btn');
        
        let currentLevel = 0;
        let fails = 0;

        const levels = [
            { // Level 1: The Hallway
                walls: [
                    { t: 0, l: 0, w: '100%', h: '30%' },
                    { t: '70%', l: 0, w: '100%', h: '30%' }
                ],
                start: { t: '40%', l: '2%', w: '80px', h: '80px' },
                goal: { t: '40%', l: '90%', w: '80px', h: '80px' }
            },
            { // Level 2: The S-Curve
                walls: [
                    { t: 0, l: '30%', w: '10%', h: '70%' },
                    { t: '30%', l: '60%', w: '10%', h: '70%' }
                ],
                start: { t: '10%', l: '10%', w: '60px', h: '60px' },
                goal: { t: '10%', l: '85%', w: '60px', h: '60px' }
            },
            { // Level 3: The Chamber
                walls: [
                    { t: '20%', l: '20%', w: '60%', h: '10%' },
                    { t: '20%', l: '20%', w: '10%', h: '60%' },
                    { t: '70%', l: '20%', w: '60%', h: '10%' },
                    { t: '40%', l: '50%', w: '10%', h: '30%' }
                ],
                start: { t: '45%', l: '5%', w: '50px', h: '50px' },
                goal: { t: '45%', l: '85%', w: '50px', h: '50px' }
            }
        ];

        // Track Mouse for custom cursor
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        function loadLevel(idx) {
            board.innerHTML = ''; // Clear board
            const data = levels[idx];
            
            // Create Start Zone
            const startZone = document.createElement('div');
            startZone.className = 'goal bg-blue-500 shadow-blue-500/50';
            startZone.style.top = data.start.t;
            startZone.style.left = data.start.l;
            startZone.style.width = data.start.w;
            startZone.style.height = data.start.h;
            startZone.innerText = "START";
            board.appendChild(startZone);

            // Create End Goal
            const endGoal = document.createElement('div');
            endGoal.className = 'goal';
            endGoal.style.top = data.goal.t;
            endGoal.style.left = data.goal.l;
            endGoal.style.width = data.goal.w;
            endGoal.style.height = data.goal.h;
            endGoal.innerText = "END";
            endGoal.onmouseenter = winLevel;
            board.appendChild(endGoal);

            // Create Walls
            data.walls.forEach(w => {
                const wall = document.createElement('div');
                wall.className = 'wall';
                wall.style.top = w.t;
                wall.style.left = w.l;
                wall.style.width = w.w;
                wall.style.height = w.h;
                wall.onmouseenter = failLevel;
                board.appendChild(wall);
            });

            document.getElementById('level-display').innerText = idx + 1;
        }

        function failLevel() {
            fails++;
            document.getElementById('fail-display').innerText = fails;
            showOverlay("Circuit Blown!", "You touched the firewall. Recalibrating sensors...", "RETRY");
        }

        function winLevel() {
            currentLevel++;
            if(currentLevel < levels.length) {
                showOverlay("Level Sync Complete", "Connection to next node established.", "NEXT LEVEL");
            } else {
                showOverlay("Master Kidventor!", "You cleared all circuits. Your mouse precision is 100%.", "RESTART ADVENTURE");
                currentLevel = 0;
                fails = 0;
            }
        }

        function showOverlay(title, body, btnText) {
            overlay.classList.remove('hidden');
            document.getElementById('msg-title').innerText = title;
            document.getElementById('msg-body').innerText = body;
            startBtn.innerText = btnText;
        }

        startBtn.onclick = () => {
            overlay.classList.add('hidden');
            loadLevel(currentLevel);
        };

        // Initial setup
        loadLevel(0);
    </script>
</body>
</html>
