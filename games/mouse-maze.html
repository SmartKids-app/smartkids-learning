<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouse Maze Master | Kidventor Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="image/favicon.png">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b, #0f172a);
            color: white;
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .maze-container {
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            overflow: hidden;
            cursor: crosshair;
        }

        .wall {
            position: absolute;
            background: rgba(255, 255, 255, 0.05);
            transition: background 0.3s;
        }

        .path {
            position: absolute;
            background: #6366f1;
            opacity: 0.15;
        }

        .start-zone {
            position: absolute;
            background: #10b981;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 10px;
            color: white;
            border-radius: 8px;
        }

        .end-zone {
            position: absolute;
            background: #f59e0b;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 10px;
            color: white;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(245, 158, 11, 0.4);
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(15, 23, 42, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .overlay-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 32px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .hud {
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .failure-flash {
            animation: flash 0.3s ease-out;
        }

        @keyframes flash {
            0% { background: rgba(239, 68, 68, 0.4); }
            100% { background: transparent; }
        }
    </style>
</head>
<body>

    <nav class="hud sticky top-0 px-8 py-4 flex justify-between items-center z-50">
        <div class="flex gap-10">
            <div>
                <p class="text-[10px] uppercase font-black text-indigo-400 tracking-widest">Level</p>
                <p id="level-display" class="text-xl font-black italic">1 / 5</p>
            </div>
            <div>
                <p class="text-[10px] uppercase font-black text-emerald-400 tracking-widest">Status</p>
                <p id="status-display" class="text-xl font-black text-slate-400 uppercase">Wait</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] uppercase font-black text-amber-400 tracking-widest">Stars</p>
            <p class="text-xl font-black text-amber-300">⭐ <span id="stars-display">0</span></p>
        </div>
    </nav>

    <main class="flex flex-col items-center justify-center h-[calc(100vh-80px)] p-6">
        <div id="maze" class="maze-container w-[600px] h-[400px]" onmouseleave="handleWallHit()">
            <!-- Maze elements generated by JS -->
        </div>
        <p class="mt-6 text-slate-500 font-bold uppercase tracking-widest text-sm">Don't touch the walls!</p>
    </main>

    <!-- UI OVERLAYS -->
    <div id="uiOverlay" class="overlay flex">
        <div class="overlay-box" id="startContent">
            <div class="text-6xl mb-6">🖱️</div>
            <h2 class="text-4xl font-black mb-4 tracking-tighter">MAZE RUNNER</h2>
            <p class="text-slate-400 mb-8">Move your mouse to the <b>GREEN</b> square to start. Reach the <b>GOLD</b> square to win.</p>
            <button onclick="hideOverlay()" class="w-full py-4 bg-indigo-600 rounded-2xl font-black text-lg hover:bg-indigo-500 transition-all">INITIALIZE</button>
        </div>

        <div class="overlay-box hidden" id="nextLevelContent">
            <div class="text-6xl mb-6">🚀</div>
            <h2 class="text-4xl font-black mb-2 tracking-tighter">LEVEL SYNCED</h2>
            <p id="levelStats" class="text-indigo-300 font-bold mb-8 uppercase tracking-widest"></p>
            <button onclick="startNextLevel()" class="w-full py-4 bg-emerald-600 rounded-2xl font-black text-lg hover:bg-emerald-500 transition-all">NEXT NODE</button>
        </div>

        <div class="overlay-box hidden" id="victoryContent">
            <div class="text-7xl mb-6">🏆</div>
            <h2 class="text-4xl font-black mb-2 tracking-tighter">MAZE MASTER</h2>
            <p class="text-slate-400 mb-8">All nodes stabilized. You have completed the Gauntlet.</p>
            <div class="flex gap-4">
                <button onclick="location.reload()" class="flex-1 py-4 bg-white text-slate-900 rounded-2xl font-black">RESTART</button>
            </div>
        </div>
    </div>

    <script>
        const maze = document.getElementById('maze');
        let currentLevel = 1;
        let isPlaying = false;
        let totalStars = 0;

        const levels = [
            { // Level 1: Straight horizontal
                start: {x: 20, y: 170},
                end: {x: 530, y: 170},
                path: [
                    {x: 20, y: 170, w: 560, h: 60}
                ]
            },
            { // Level 2: L-Shape
                start: {x: 20, y: 20},
                end: {x: 530, y: 320},
                path: [
                    {x: 20, y: 20, w: 560, h: 60},
                    {x: 520, y: 20, w: 60, h: 360}
                ]
            },
            { // Level 3: The S-Curve
                start: {x: 20, y: 20},
                end: {x: 20, y: 320},
                path: [
                    {x: 20, y: 20, w: 560, h: 50},
                    {x: 530, y: 20, w: 50, h: 180},
                    {x: 20, y: 150, w: 560, h: 50},
                    {x: 20, y: 150, w: 50, h: 220}
                ]
            },
            { // Level 4: The Staircase
                start: {x: 20, y: 330},
                end: {x: 530, y: 20},
                path: [
                    {x: 20, y: 330, w: 100, h: 50},
                    {x: 100, y: 250, w: 50, h: 130},
                    {x: 100, y: 250, w: 150, h: 50},
                    {x: 230, y: 150, w: 50, h: 150},
                    {x: 230, y: 150, w: 200, h: 50},
                    {x: 410, y: 20, w: 50, h: 180},
                    {x: 410, y: 20, w: 170, h: 50}
                ]
            },
            { // Level 5: The Narrow Gauntlet
                start: {x: 280, y: 340},
                end: {x: 280, y: 20},
                path: [
                    {x: 280, y: 340, w: 40, h: 40},
                    {x: 100, y: 300, w: 400, h: 40},
                    {x: 100, y: 200, w: 40, h: 140},
                    {x: 100, y: 200, w: 400, h: 30},
                    {x: 460, y: 100, w: 40, h: 130},
                    {x: 100, y: 100, w: 400, h: 25},
                    {x: 100, y: 20, w: 25, h: 100},
                    {x: 100, y: 20, w: 220, h: 30}
                ]
            }
        ];

        function buildMaze(lvlIdx) {
            maze.innerHTML = '';
            const config = levels[lvlIdx];

            // 1. Create Safe Path Blocks
            config.path.forEach(p => {
                const block = document.createElement('div');
                block.className = 'path';
                block.style.left = p.x + 'px';
                block.style.top = p.y + 'px';
                block.style.width = p.w + 'px';
                block.style.height = p.h + 'px';
                maze.appendChild(block);
            });

            // 2. Create Start
            const start = document.createElement('div');
            start.className = 'start-zone';
            start.style.left = config.start.x + 'px';
            start.style.top = config.start.y + 'px';
            start.style.width = '50px';
            start.style.height = '50px';
            start.innerText = "START";
            start.onmouseenter = startPlaying;
            maze.appendChild(start);

            // 3. Create End
            const end = document.createElement('div');
            end.className = 'end-zone';
            end.style.left = config.end.x + 'px';
            end.style.top = config.end.y + 'px';
            end.style.width = '50px';
            end.style.height = '50px';
            end.innerText = "GOAL";
            end.onmouseenter = handleWin;
            maze.appendChild(end);

            // 4. Fill remaining space with invisible wall logic
            maze.onmousemove = (e) => {
                if (!isPlaying) return;
                const rect = maze.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                // Check if mouse is within any path block
                const inPath = config.path.some(p => 
                    x >= p.x && x <= p.x + p.w &&
                    y >= p.y && y <= p.y + p.h
                );

                if (!inPath) handleWallHit();
            };

            document.getElementById('level-display').textContent = `${currentLevel} / 5`;
        }

        function startPlaying() {
            if (isPlaying) return;
            isPlaying = true;
            document.getElementById('status-display').textContent = "Active";
            document.getElementById('status-display').className = "text-xl font-black text-emerald-400 uppercase italic";
        }

        function handleWallHit() {
            if (!isPlaying) return;
            isPlaying = false;
            document.body.classList.add('failure-flash');
            setTimeout(() => document.body.classList.remove('failure-flash'), 300);
            
            document.getElementById('status-display').textContent = "Failed";
            document.getElementById('status-display').className = "text-xl font-black text-red-500 uppercase";
            // No reset needed, just requires going back to green square
        }

        function handleWin() {
            if (!isPlaying) return;
            isPlaying = false;
            totalStars += 10;
            document.getElementById('stars-display').textContent = totalStars;
            
            if (currentLevel < 5) {
                showNextLevelOverlay();
            } else {
                showVictory();
            }
        }

        function showNextLevelOverlay() {
            document.getElementById('uiOverlay').style.display = 'flex';
            document.getElementById('startContent').classList.add('hidden');
            document.getElementById('nextLevelContent').classList.remove('hidden');
            document.getElementById('levelStats').textContent = `Node ${currentLevel} Stabilized`;
        }

        function startNextLevel() {
            currentLevel++;
            document.getElementById('uiOverlay').style.display = 'none';
            document.getElementById('nextLevelContent').classList.add('hidden');
            document.getElementById('status-display').textContent = "Wait";
            document.getElementById('status-display').className = "text-xl font-black text-slate-400 uppercase";
            buildMaze(currentLevel - 1);
        }

        function showVictory() {
            document.getElementById('uiOverlay').style.display = 'flex';
            document.getElementById('nextLevelContent').classList.add('hidden');
            document.getElementById('victoryContent').classList.remove('hidden');
        }

        function hideOverlay() {
            document.getElementById('uiOverlay').style.display = 'none';
            buildMaze(0);
        }

    </script>
</body>
</html>
