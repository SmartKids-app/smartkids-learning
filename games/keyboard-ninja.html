<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Code Match Master | Kidventor Academy</title>
<script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" type="image/png" href="image/favicon.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=JetBrains+Mono:wght@700&display=swap');

body {
    font-family: 'Plus Jakarta Sans', sans-serif;
    background: radial-gradient(circle at center, #1e1b4b, #0f172a);
    color: white;
    min-height: 100vh;
    margin: 0;
}

.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border: 2px solid rgba(255,255,255,0.1);
    padding: 12px;
    border-radius: 16px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    font-weight: 800;
    font-size: 0.75rem;
    text-transform: uppercase;
}

.card:hover { transform: translateY(-3px); background: rgba(255,255,255,0.1); }
.selected { background: #6366f1 !important; border-color: #818cf8; }
.correct { background: #10b981 !important; border-color: #34d399; opacity: 0.8; cursor: default; }
.wrong { background: #ef4444 !important; border-color: #f87171; animation: shake 0.4s ease; }

@keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
}

.code-font { font-family: 'JetBrains Mono', monospace; }

.hud-panel {
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(15px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
}

.overlay {
    position: fixed;
    inset: 0;
    background: rgba(15,23,42,0.95);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.overlay-box {
    max-width: 450px;
    width: 90%;
    background: rgba(30, 41, 59, 0.7);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    padding: 40px;
    text-align: center;
    backdrop-filter: blur(20px);
}
</style>
</head>
<body>

<nav class="hud-panel sticky top-0 z-50 px-6 py-4">
    <div class="max-w-6xl mx-auto flex justify-between items-center">
        <div class="flex gap-8">
            <div>
                <p class="text-[10px] uppercase font-black text-indigo-400">Score</p>
                <p id="score" class="text-xl font-black">0</p>
            </div>
            <div>
                <p class="text-[10px] uppercase font-black text-emerald-400">Level</p>
                <p id="level-display" class="text-xl font-black">1/20</p>
            </div>
        </div>
        <div class="text-right">
            <p class="text-[10px] uppercase font-black text-amber-400">Rewards</p>
            <p class="text-xl font-black text-amber-300">⭐ <span id="stars">0</span></p>
        </div>
    </div>
</nav>

<main class="max-w-6xl mx-auto p-6">

    <div id="start-screen" class="text-center max-w-xl mx-auto pt-20">
        <div class="text-7xl mb-8">🛠️</div>
        <h1 class="text-6xl font-black mb-4">CORE SYNC</h1>
        <p class="text-slate-400 mb-10 text-lg">Master all 50 code pairs across 20 levels. No alerts, just pure coding logic.</p>
        <button onclick="initGame()" class="px-12 py-5 rounded-2xl bg-indigo-600 font-black text-xl hover:bg-indigo-500 transition-all">
            START MISSION
        </button>
    </div>

    <div id="game-container" class="hidden">
        <div id="board" class="grid gap-4"></div>
    </div>

    <div id="end-screen" class="hidden text-center pt-20">
        <div class="text-8xl mb-6">🌌</div>
        <h2 class="text-6xl font-black">SYSTEM MASTER</h2>
        <p id="final-stats" class="mt-6 text-2xl font-black text-indigo-300"></p>
        <div class="mt-12 flex gap-4 justify-center">
            <button onclick="location.reload()" class="px-8 py-4 rounded-2xl bg-white text-slate-900 font-black">PLAY AGAIN</button>
            <button onclick="window.location.href='../missions.html'" class="px-8 py-4 rounded-2xl bg-indigo-600 text-white font-black">EXIT</button>
        </div>
    </div>

</main>

<div id="messageOverlay" class="overlay">
    <div class="overlay-box">
        <div id="overlayEmoji" class="text-6xl mb-4">💎</div>
        <h3 id="overlayTitle" class="text-3xl font-black mb-2 text-white">Level Complete</h3>
        <p id="overlayText" class="text-slate-400 mb-8"></p>
        <button onclick="closeOverlay()" class="px-10 py-4 rounded-2xl bg-indigo-600 text-white font-black w-full hover:bg-indigo-500">
            NEXT LEVEL
        </button>
    </div>
</div>

<script>
// FULL 50 PAIR LIBRARY
const matchLibrary = [
    { a:'<html>', b:'</html>' }, { a:'<body>', b:'</body>' }, { a:'const', b:'variable' },
    { a:'function', b:'() => {}' }, { a:'console', b:'.log()' }, { a:'array', b:'[1,2]' },
    { a:'boolean', b:'true/false' }, { a:'string', b:'"hello"' }, { a:'event', b:'click' },
    { a:'loop', b:'for each' }, { a:'bug', b:'debug' }, { a:'robot', b:'logic' },
    { a:'input', b:'output' }, { a:'css', b:'style' }, { a:'image', b:'src' },
    { a:'button', b:'submit' }, { a:'database', b:'storage' }, { a:'cloud', b:'server' },
    { a:'AI', b:'smart logic' }, { a:'security', b:'password' }, { a:'keyboard', b:'typing' },
    { a:'mouse', b:'clicking' }, { a:'screen', b:'display' }, { a:'wifi', b:'internet' },
    { a:'monitor', b:'visual output' }, { a:'speaker', b:'sound output' }, { a:'printer', b:'paper output' },
    { a:'scanner', b:'image input' }, { a:'microphone', b:'voice input' }, { a:'camera', b:'photo capture' },
    { a:'USB', b:'data transfer' }, { a:'RAM', b:'temporary memory' }, { a:'ROM', b:'permanent memory' },
    { a:'CPU', b:'brain of computer' }, { a:'GPU', b:'graphics processor' }, { a:'hard drive', b:'file storage' },
    { a:'software', b:'programs' }, { a:'hardware', b:'physical parts' }, { a:'browser', b:'internet access' },
    { a:'website', b:'web pages' }, { a:'domain', b:'site address' }, { a:'hosting', b:'website home' },
    { a:'password', b:'secure login' }, { a:'username', b:'user identity' }, { a:'folder', b:'file organizer' },
    { a:'file', b:'saved document' }, { a:'download', b:'receive file' }, { a:'upload', b:'send file' },
    { a:'refresh', b:'reload page' }, { a:'search', b:'find information' }
];

let level = 1;
const maxLevel = 20;
let score = 0;
let stars = 0;
let selectedCards = [];
let canClick = true;

function initGame() {
    document.getElementById("start-screen").classList.add("hidden");
    document.getElementById("game-container").classList.remove("hidden");
    loadLevel();
}

function loadLevel() {
    const board = document.getElementById("board");
    board.innerHTML = "";
    selectedCards = [];

    // Scale pairs from 4 up to 18 based on level
    const pairCount = Math.min(4 + Math.floor(level * 0.75), 18);

    // Adjust grid columns based on pair count
    if (pairCount <= 6) board.className = "grid grid-cols-2 md:grid-cols-4 gap-4";
    else if (pairCount <= 12) board.className = "grid grid-cols-3 md:grid-cols-6 gap-3";
    else board.className = "grid grid-cols-4 md:grid-cols-8 gap-2";

    let selectedPairs = [...matchLibrary].sort(() => Math.random() - 0.5).slice(0, pairCount);
    let deck = [];
    selectedPairs.forEach((pair, index) => {
        deck.push({ text: pair.a, id: index }, { text: pair.b, id: index });
    });
    deck.sort(() => Math.random() - 0.5);

    deck.forEach(item => {
        const card = document.createElement("div");
        card.className = "card code-font";
        card.textContent = item.text;
        card.dataset.id = item.id;
        card.onclick = () => handleCardClick(card);
        board.appendChild(card);
    });

    document.getElementById("level-display").textContent = `${level}/${maxLevel}`;
}

function handleCardClick(card) {
    if (!canClick || card.classList.contains("selected") || card.classList.contains("correct")) return;
    card.classList.add("selected");
    selectedCards.push(card);
    if (selectedCards.length === 2) checkMatch();
}

function checkMatch() {
    canClick = false;
    const [a, b] = selectedCards;

    if (a.dataset.id === b.dataset.id) {
        setTimeout(() => {
            a.className = "card correct code-font";
            b.className = "card correct code-font";
            score += (20 * level);
            stars += 2;
            updateHUD();
            selectedCards = [];
            canClick = true;
            checkWin();
        }, 300);
    } else {
        setTimeout(() => {
            a.classList.add("wrong");
            b.classList.add("wrong");
            setTimeout(() => {
                a.classList.remove("selected", "wrong");
                b.classList.remove("selected", "wrong");
                selectedCards = [];
                canClick = true;
            }, 500);
        }, 300);
    }
}

function checkWin() {
    const remaining = document.querySelectorAll(".card:not(.correct)");
    if (remaining.length === 0) {
        if (level < maxLevel) {
            showOverlay("🚀", `Level ${level} Sync Complete`, `Node stabilized. Initializing Level ${level + 1}...`);
            level++;
        } else {
            showEnd();
        }
    }
}

function showOverlay(emoji, title, text) {
    document.getElementById("overlayEmoji").textContent = emoji;
    document.getElementById("overlayTitle").textContent = title;
    document.getElementById("overlayText").textContent = text;
    document.getElementById("messageOverlay").style.display = "flex";
}

function closeOverlay() {
    document.getElementById("messageOverlay").style.display = "none";
    loadLevel();
}

function updateHUD() {
    document.getElementById("score").textContent = score;
    document.getElementById("stars").textContent = stars;
}

function showEnd() {
    document.getElementById("game-container").classList.add("hidden");
    document.getElementById("end-screen").classList.remove("hidden");
    document.getElementById("final-stats").textContent = `TOTAL SCORE: ${score} | ⭐ STARS: ${stars}`;
}
</script>
</body>
</html>
