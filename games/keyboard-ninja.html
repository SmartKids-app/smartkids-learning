<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Code Match Master | Kidventor Academy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=JetBrains+Mono:wght@700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: radial-gradient(circle at center, #1e1b4b, #0f172a);
            color: white;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 24px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            aspect-ratio: 1 / 1;
            font-weight: 800;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .card:hover { transform: scale(1.05); background: rgba(255, 255, 255, 0.1); }
        .selected { background: #6366f1 !important; border-color: #818cf8; transform: scale(0.95); }
        .correct { background: #10b981 !important; border-color: #34d399; animation: success 0.5s ease; }
        .wrong { background: #ef4444 !important; border-color: #f87171; animation: shake 0.4s ease; }

        @keyframes success {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .hud-panel {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .code-font { font-family: 'JetBrains Mono', monospace; }
    </style>
</head>
<body>

    <!-- HUD -->
    <nav class="hud-panel sticky top-0 z-50 px-6 py-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex gap-6">
                <div>
                    <p class="text-[10px] font-black text-indigo-400 uppercase tracking-widest">Score</p>
                    <p id="score" class="text-xl font-black">0</p>
                </div>
                <div>
                    <p class="text-[10px] font-black text-emerald-400 uppercase tracking-widest">Level</p>
                    <p id="level-display" class="text-xl font-black">1/10</p>
                </div>
            </div>
            <div class="text-right">
                <p class="text-[10px] font-black text-amber-400 uppercase tracking-widest">Rewards</p>
                <p class="text-xl font-black">⭐ <span id="stars">0</span></p>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <!-- START SCREEN -->
        <div id="start-screen" class="text-center max-w-md">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl mx-auto mb-6 flex items-center justify-center text-4xl">🧩</div>
            <h1 class="text-5xl font-black tracking-tighter mb-4">CODE MATCH</h1>
            <p class="text-slate-400 font-medium mb-8">Connect the logic blocks. Complete all 10 levels to become a Master Inventor.</p>
            <button onclick="initGame()" class="w-full py-5 bg-indigo-600 hover:bg-indigo-500 rounded-2xl font-black text-lg transition-all shadow-xl shadow-indigo-500/20">
                INITIALIZE CORE
            </button>
        </div>

        <!-- GAME BOARD -->
        <div id="game-container" class="hidden w-full max-w-2xl">
            <div id="board" class="grid gap-4"></div>
        </div>

        <!-- VICTORY SCREEN -->
        <div id="end-screen" class="hidden text-center">
            <div class="text-7xl mb-6">🏆</div>
            <h1 class="text-5xl font-black mb-2">MISSION COMPLETE</h1>
            <p class="text-indigo-300 font-bold uppercase tracking-widest mb-8">All Circuits Synchronized</p>
            <div class="bg-white/5 p-6 rounded-3xl border border-white/10 mb-8">
                <p class="text-sm text-slate-400 uppercase font-black">Final Performance</p>
                <p id="final-stats" class="text-2xl font-black mt-2"></p>
            </div>
            <button onclick="location.reload()" class="px-12 py-5 bg-white text-slate-900 rounded-2xl font-black hover:bg-indigo-100 transition-all">
                RESTART ARCHIVE
            </button>
        </div>
    </main>

    <script>
        // DATA SET FOR 10 LEVELS
        const matchLibrary = [
            { a: "<html>", b: "</html>" },
            { a: "<body>", b: "</body>" },
            { a: "if (true)", b: "then run" },
            { a: "const", b: "variable" },
            { a: "style", b: "css" },
            { a: "console", b: ".log()" },
            { a: "function", b: "() => {}" },
            { a: "array", b: "[ 0, 1 ]" },
            { a: "boolean", b: "true/false" },
            { a: "string", b: '"hello"' },
            { a: "<img />", b: "src='...'" },
            { a: "loop", b: "for each" },
            { a: "click", b: "event" },
            { a: "bug", b: "debug" },
            { a: "robot", b: "logic" },
            { a: "input", b: "output" }
        ];

        let level = 1;
        let score = 0;
        let stars = 0;
        let selectedCards = [];
        let canClick = true;

        function initGame() {
            document.getElementById('start-screen').classList.add('hidden');
            document.getElementById('game-container').classList.remove('hidden');
            loadLevel();
        }

        function loadLevel() {
            const board = document.getElementById('board');
            board.innerHTML = '';
            selectedCards = [];
            
            // Level Logic: Start with 3 pairs, add 1 pair every level
            const pairCount = Math.min(3 + (level - 1), 8); 
            
            // Set Grid Columns based on pair count
            board.style.gridTemplateColumns = pairCount > 6 ? 'repeat(4, 1fr)' : 'repeat(3, 1fr)';
            if (pairCount <= 3) board.style.gridTemplateColumns = 'repeat(2, 1fr)';

            // Pick random pairs from library
            let shuffledLib = [...matchLibrary].sort(() => 0.5 - Math.random());
            let selectedPairs = shuffledLib.slice(0, pairCount);

            // Create card objects
            let deck = [];
            selectedPairs.forEach((pair, index) => {
                deck.push({ text: pair.a, pairID: index });
                deck.push({ text: pair.b, pairID: index });
            });

            // Shuffle deck
            deck.sort(() => 0.5 - Math.random());

            deck.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card code-font';
                card.textContent = item.text;
                card.dataset.id = item.pairID;
                card.onclick = () => handleCardClick(card);
                board.appendChild(card);
            });

            document.getElementById('level-display').textContent = `${level}/10`;
        }

        function handleCardClick(card) {
            if (!canClick || card.classList.contains('selected') || card.classList.contains('correct')) return;

            card.classList.add('selected');
            selectedCards.push(card);

            if (selectedCards.length === 2) {
                checkMatch();
            }
        }

        function checkMatch() {
            canClick = false;
            const [c1, c2] = selectedCards;

            if (c1.dataset.id === c2.dataset.id) {
                // MATCH
                setTimeout(() => {
                    c1.className = 'card correct code-font';
                    c2.className = 'card correct code-font';
                    score += 20;
                    stars += 5;
                    updateHUD();
                    selectedCards = [];
                    canClick = true;
                    checkWin();
                }, 300);
            } else {
                // FAIL
                setTimeout(() => {
                    c1.classList.add('wrong');
                    c2.classList.add('wrong');
                    setTimeout(() => {
                        c1.className = 'card code-font';
                        c2.className = 'card code-font';
                        selectedCards = [];
                        canClick = true;
                    }, 400);
                }, 300);
            }
        }

        function checkWin() {
            const remaining = document.querySelectorAll('.card:not(.correct)');
            if (remaining.length === 0) {
                if (level < 10) {
                    level++;
                    setTimeout(() => {
                        alert(`Level ${level-1} Synchronized! Loading next node...`);
                        loadLevel();
                    }, 500);
                } else {
                    showEnd();
                }
            }
        }

        function updateHUD() {
            document.getElementById('score').textContent = score;
            document.getElementById('stars').textContent = stars;
        }

        function showEnd() {
            document.getElementById('game-container').classList.add('hidden');
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-stats').textContent = `SCORE: ${score} | ⭐ ${stars}`;
            
            // Save to local storage for Kidventor economy
            let saved = Number(localStorage.getItem("kidventorStars")) || 0;
            localStorage.setItem("kidventorStars", saved + stars);
        }
    </script>
</body>
</html>
